      t.texts.forEach((txt, i) => {
        canvas.add(new fabric.IText(txt, {
          left: cx, top: cy + i * 40 - 20, originX: 'center', originY: 'center',
          fontFamily: 'Impact', fontSize: i === 0 ? 32 : 20, fill: t.colors[i % t.colors.length],
          fontWeight: 'bold', textAlign: 'center'
        }));
      });

    } else if (el.type === 'lumi-template') {
      // Carica template .lumi — usa bounding-box fit dinamico per posizionare
      // nella zona stampa indipendentemente dal canvas sorgente Lumise

      fetch(el.path)
        .then(r => r.ok ? r.json() : Promise.reject('fetch error'))
        .then(data => {
          const parsed = JSON.parse(data.stages.lumise.data);
          const objs = parsed.objects || [];

          // Filtra oggetti validi (no immagini prodotto, no localhost)
          const validObjs = objs.filter(o =>
            o && o.type && o.type !== 'image' &&
            !(o.src && o.src.includes('localhost'))
          );
          if (validObjs.length === 0) { if (el.onDone) el.onDone(); return; }

          // Raccoglie font usati e aspetta il caricamento prima di renderizzare
          const fontsUsed = [...new Set(
            validObjs
              .filter(o => (o.type === 'i-text' || o.type === 'text') && o.fontFamily)
              .map(o => o.fontFamily)
              .filter(f => !['Inter','Arial','Impact','Times New Roman','Helvetica','Courier New','Verdana','Georgia'].includes(f))
          )];
          // Carica i font da Google Fonts e aspetta che siano pronti
          // Nota: alcuni font Lumise sono commerciali e non disponibili su GF →
          // il browser userà il fallback più simile disponibile
          const loadFonts = fontsUsed.length > 0 ? new Promise(resolve => {
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = 'https://fonts.googleapis.com/css2?family=' +
              fontsUsed.map(f => encodeURIComponent(f) + ':ital,wght@0,400;0,700;1,400').join('&family=') + '&display=swap';
            link.onload = () => {
              // CSS caricato → aspetta che i file font siano scaricati
              if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(resolve);
              } else { resolve(); }
              setTimeout(resolve, 3000); // max 3s anche se fonts.ready non risolve
            };
            link.onerror = resolve;
            document.head.appendChild(link);
            setTimeout(resolve, 4000); // fallback assoluto 4s
          }) : Promise.resolve();

          loadFonts.then(() => {
            // ── Bounding box di tutti gli oggetti nel sorgente ────────
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            validObjs.forEach(o => {
              const ox = o.left || 0;
              const oy = o.top  || 0;
              // Stima dimensioni: usa width/height se presenti, altrimenti da fontSize
              const ow = (o.width  || (o.fontSize ? (o.text||'X').length * o.fontSize * 0.6 : 100)) * (o.scaleX || 1);
              const oh = (o.height || (o.fontSize ? o.fontSize * 1.4 : 50)) * (o.scaleY || 1);
              const cX = o.originX === 'center';
              const cY = o.originY === 'center';
              minX = Math.min(minX, cX ? ox - ow/2 : ox);
              maxX = Math.max(maxX, cX ? ox + ow/2 : ox + ow);
              minY = Math.min(minY, cY ? oy - oh/2 : oy);
              maxY = Math.max(maxY, cY ? oy + oh/2 : oy + oh);
            });
            if (!isFinite(minX)) { minX=0; maxX=400; minY=0; maxY=400; }

            // ── Scala per far stare tutto nella zona stampa ───────────
            const srcW = Math.max(maxX - minX, 10);
            const srcH = Math.max(maxY - minY, 10);
            const S = Math.min(
              (zone.width  - 16) / srcW,
              (zone.height - 16) / srcH,
              2  // non ingrandire oltre 2×
            );

            // ── Centra nella zona stampa ──────────────────────────────
            const srcCX = (minX + maxX) / 2;
            const srcCY = (minY + maxY) / 2;
            const DX = (zone.left + zone.width  / 2) - srcCX * S;
            const DY = (zone.top  + zone.height / 2) - srcCY * S;

            // NON pulisce canvas — il template viene aggiunto sopra al design esistente
            let svgPending = validObjs.filter(o =>
              o.type === 'svg' && o.src && o.src.startsWith('data:image/svg+xml;base64,')
            ).length;
            let doneCalled = false;
            const onAllDone = () => {
              if (doneCalled) return; doneCalled = true;
              canvas.renderAll();
              DesignerHistory.save(canvas);
              if (el.onDone) el.onDone();
            };

            validObjs.forEach(obj => {
              const nx  = (obj.left  || 0) * S + DX;
              const ny  = (obj.top   || 0) * S + DY;
              const nsx = (obj.scaleX || 1) * S;
              const nsy = (obj.scaleY || 1) * S;
              const base = {
                left: nx, top: ny, scaleX: nsx, scaleY: nsy,
                angle:   obj.angle   || 0,
                originX: obj.originX || 'left',
                originY: obj.originY || 'top',
                opacity: obj.opacity !== undefined ? obj.opacity : 1,
              };

              if (obj.type === 'i-text' || obj.type === 'text') {
                const t = new fabric.IText(obj.text || '', {
                  ...base,
                  fontFamily:  obj.fontFamily  || 'Arial',
                  fontSize:    obj.fontSize    || 30,
                  fill:        obj.fill        || '#000000',
                  fontWeight:  obj.fontWeight  || 'normal',
                  fontStyle:   obj.fontStyle   || 'normal',
                  textAlign:   obj.textAlign   || 'left',
                  charSpacing: obj.charSpacing || 0,
                  lineHeight:  obj.lineHeight  || 1.16,
                  strokeWidth: obj.strokeWidth || 0,
                  stroke:      obj.stroke      || null,

                if (window._makeClipRect) t.clipPath = window._makeClipRect(window._designerZone || zone);

                  fabric.loadSVGFromString(svgText, (objects, options) => {
                    if (!objects || !objects.length) { svgPending--; if (svgPending<=0) onAllDone(); return; }
                    const group = fabric.util.groupSVGElements(objects, options);
                    group.set(base);
                    if (window._makeClipRect) group.clipPath = window._makeClipRect(window._designerZone || zone);
                    group._noClip = true;
                    canvas.add(group);
                    svgPending--;
                    if (svgPending <= 0) onAllDone();
                  });
                } catch(e) { svgPending--; if (svgPending<=0) onAllDone(); }
              }
            });

            if (svgPending === 0) onAllDone();
          });
        })
        .catch(err => {
          console.error('Errore caricamento template .lumi:', err);
          if (el.onDone) el.onDone();
        });
    }
    canvas.renderAll();
  }, [zone]);

  // ── Admin export gate ────────────────────────────────────────
  const ADMIN_PASSWORD = 'wonderspit2025'; // ← cambia qui la password admin
  // exportUnlocked — variabile globale window, persiste tra render e navigazione hash

  const [exportUnlocked, setExportUnlocked] = useState(() => !!window.__wsAdminOk);

  const [showPwdModal, setShowPwdModal] = useState(false);

  const svgH = product === 'hoodie' ? 533 : product === 'longsleeve' ? 500 : 475;

  // Zoom utente → canvas.zoomToPoint() Fabric → nitido
  const { baseScale } = useCanvasPhysicalSize(bp);

    <div style={{ position:'fixed', bottom:24, right:24, background:'#2d3142', color:'#fff', borderRadius:10,

}

// ── ANTEPRIMA ZONA STAMPA — trascinabile e ridimensionabile ──
function MockupZoneEditor({ product, zone, onChange }) {
  const PREVIEW_W = 280; // larghezza anteprima in px
  const [previewSide, setPreviewSide] = useState('Fronte');
  const containerRef = useRef();
  const dragRef = useRef(null);

  // URL mockup costruito automaticamente dall'id prodotto
  const GITHUB_BASE = '/mockups/';
  const mockupUrl = GITHUB_BASE + product.id + '/' + (previewSide === 'Fronte' ? 'fronte' : 'retro') + '.png';

  // Scala: PREVIEW_W px = productWidthCm cm
  const pWcm = product.productWidthCm || 50;
  const scale = PREVIEW_W / pWcm; // px per cm
  const previewH = Math.round(PREVIEW_W * 1.2); // altezza proporzionale

  // Zona in px per l'anteprima
  const zPx = {
    x: Math.round((zone.x || 0) * scale),
    y: Math.round((zone.y || 0) * scale),
    w: Math.round((zone.w || 10) * scale),
    h: Math.round((zone.h || 10) * scale),
  };

  // Converti px→cm e notifica cambio
  const pxToCm = (px) => Math.round((px / scale) * 10) / 10;

  // ── Drag (sposta) ──
  const startDrag = (e) => {
    e.preventDefault();
    const rect = containerRef.current.getBoundingClientRect();
    const startX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left - zPx.x;
    const startY = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top  - zPx.y;
    const onMove = (ev) => {
      const cx = (ev.touches ? ev.touches[0].clientX : ev.clientX) - rect.left;
      const cy = (ev.touches ? ev.touches[0].clientY : ev.clientY) - rect.top;
      const nx = Math.max(0, Math.min(cx - startX, PREVIEW_W - zPx.w));
      const ny = Math.max(0, Math.min(cy - startY, previewH - zPx.h));
      onChange({ ...zone, x: pxToCm(nx), y: pxToCm(ny) });
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive:false });
    window.addEventListener('touchend', onUp);
  };

  // ── Resize (angolo in basso a destra) ──
  const startResize = (e) => {
    e.preventDefault();
    e.stopPropagation();
    const rect = containerRef.current.getBoundingClientRect();
    const startX = (e.touches ? e.touches[0].clientX : e.clientX);
    const startY = (e.touches ? e.touches[0].clientY : e.clientY);
    const origW = zPx.w;
    const origH = zPx.h;
    const onMove = (ev) => {
      const dx = (ev.touches ? ev.touches[0].clientX : ev.clientX) - startX;
      const dy = (ev.touches ? ev.touches[0].clientY : ev.clientY) - startY;
      const nw = Math.max(20, Math.min(origW + dx, PREVIEW_W - zPx.x));
      const nh = Math.max(20, Math.min(origH + dy, previewH - zPx.y));
      onChange({ ...zone, w: pxToCm(nw), h: pxToCm(nh) });
    };
    const onUp = () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove, { passive:false });
    window.addEventListener('touchend', onUp);
  };

  // Lati disponibili con mockup
  const availableSides = (product.sides || ['Fronte','Retro']).filter(s =>
    !product.mockups || product.mockups[s] !== null
  );

  return (
    <div>
      {/* Tab lato */}
      {availableSides.length > 1 && (
        <div style={{ display:'flex', gap:4, marginBottom:8 }}>
          {availableSides.map(s => (
            <button key={s} onClick={() => setPreviewSide(s)}
              style={{ padding:'3px 10px', borderRadius:12, border:'none', cursor:'pointer',
                fontSize:11, fontWeight:500,
                background: previewSide===s ? '#3fc7ba' : '#f0f0f0',
                color: previewSide===s ? '#fff' : '#555' }}>
              {s}
            </button>
          ))}
        </div>
      )}

      {/* Anteprima */}
      <div ref={containerRef}
        style={{ position:'relative', width:PREVIEW_W, height:previewH,
          background:'#fff', borderRadius:8, overflow:'hidden',
          border:'1px solid #e0e0e0', userSelect:'none', flexShrink:0 }}>

        {/* Mockup immagine */}
        <img src={mockupUrl} alt={previewSide}
          style={{ width:'100%', height:'100%', objectFit:'contain',
            pointerEvents:'none', display:'block' }}
          onError={e => { e.target.style.opacity = '0.2'; }} />

        {/* Zona stampa trascinabile */}
        <div
          onMouseDown={startDrag}
          onTouchStart={startDrag}
          style={{
            position:'absolute',
            left: zPx.x, top: zPx.y,
            width: zPx.w, height: zPx.h,
            border: '2px dashed #3fc7ba',
            background: 'rgba(63,199,186,0.08)',
            cursor: 'move',
            borderRadius: 2,
            boxSizing: 'border-box',
          }}>
          {/* Label dimensioni */}
          <div style={{ position:'absolute', top:-18, left:0, fontSize:9,
            color:'#3fc7ba', fontWeight:700, whiteSpace:'nowrap' }}>
            {zone.w}×{zone.h} cm
          </div>
          {/* Handle resize angolo basso dx */}
          <div
            onMouseDown={startResize}
            onTouchStart={startResize}
            style={{
              position:'absolute', right:-5, bottom:-5,
              width:12, height:12,
              background:'#3fc7ba', borderRadius:2,
              cursor:'se-resize',
            }} />
        </div>
      </div>

      {/* Campi CM manuali */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:6, marginTop:10 }}>
        {[['x','← X'],['y','↕ Y'],['w','↔ W'],['h','↕ H']].map(([f,lbl]) => (
          <div key={f}>
            <div style={{ fontSize:9, fontWeight:700, color:'#888', marginBottom:2 }}>{lbl} (cm)</div>
            <input type="number" step="0.5" value={zone[f] || 0}
              onChange={e => onChange({ ...zone, [f]: parseFloat(e.target.value)||0 })}
              style={{ ...inp, fontSize:12, padding:'4px 6px' }} />
          </div>
        ))}
      </div>
    </div>
  );
}

// ── CLIPARTS TAB ──────────────────────────────────────────────
function ClipartsTab({ toast }) {
  const [cliparts, setCliparts] = useState(() => AdminStore.get('cliparts'));
  const [newLabel, setNewLabel] = useState('');
  const [newSvg, setNewSvg] = useState('');
  const fileRef = useRef();

  const save = (list) => { setCliparts(list); AdminStore.set('cliparts', list); toast('Salvato!'); };
  const remove = (id) => save(cliparts.filter(c => c.id !== id));
  const addManual = () => {
    if (!newLabel.trim() || !newSvg.trim()) return;
    save([...cliparts, { id: Date.now().toString(), label: newLabel, svg: newSvg }]);
    setNewLabel(''); setNewSvg('');
  };
  const handleSvgFile = (file) => {
    const r = new FileReader();
    r.onload = e => {
      const content = e.target.result;
      const inner = content.replace(/<\?xml[^>]*\?>/g,'').replace(/<svg[^>]*>/g,'').replace(/<\/svg>/g,'').trim();
      setNewSvg(inner);
      if (!newLabel) setNewLabel(file.name.replace('.svg',''));
    };
    r.readAsText(file);
  };

  return (
    <div>
      <h2 style={{ fontSize:18, fontWeight:700, marginBottom:16 }}>Gestione Clipart</h2>

      {/* Add new */}
      <div style={card}>
        <div style={{ fontWeight:600, fontSize:14, marginBottom:14 }}>➕ Aggiungi Clipart</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>
          <div>
            <label style={label}>Nome</label>
            <input value={newLabel} onChange={e => setNewLabel(e.target.value)} placeholder="Es: Fiamma" style={inp} />
          </div>
          <div>
            <label style={label}>Carica SVG</label>
            <button onClick={() => fileRef.current.click()} style={ghost}>📁 Scegli file SVG...</button>
            <input ref={fileRef} type="file" accept=".svg" style={{ display:'none' }} onChange={e => handleSvgFile(e.target.files[0])} />
          </div>
        </div>
        <label style={label}>Inner SVG (path/polygon del simbolo, senza tag svg)</label>
        <textarea value={newSvg} onChange={e => setNewSvg(e.target.value)} rows={3}
          placeholder='<path d="M..." fill="currentColor"/>'
          style={{ ...inp, resize:'vertical', marginBottom:12 }} />
        {newSvg && (
          <div style={{ marginBottom:12, display:'flex', alignItems:'center', gap:8 }}>
            <span style={{ fontSize:11, color:'#888' }}>Anteprima:</span>
            <svg viewBox="0 0 24 24" width={40} height={40} style={{ color:'#3fc7ba', border:'1px solid #eee', borderRadius:6, padding:4 }}
              dangerouslySetInnerHTML={{ __html: newSvg }} />
          </div>
        )}
        <button onClick={addManual} style={btn()}>+ Aggiungi</button>
      </div>

      {/* List */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(100px,1fr))', gap:10 }}>
        {cliparts.map(c => (
          <div key={c.id} style={{ ...card, padding:12, textAlign:'center', position:'relative', marginBottom:0 }}>
            <svg viewBox="0 0 24 24" width={36} height={36} style={{ color:'#3fc7ba' }} dangerouslySetInnerHTML={{ __html: c.svg }} />
            <div style={{ fontSize:11, color:'#555', marginTop:4, fontWeight:500 }}>{c.label}</div>
            <button onClick={() => remove(c.id)}
              style={{ position:'absolute', top:4, right:4, background:'none', border:'none', cursor:'pointer', color:'#e74c3c', fontSize:12 }}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── FONTS TAB ─────────────────────────────────────────────────
function FontsTab({ toast }) {
  const [fonts, setFonts] = useState(() => AdminStore.get('fonts'));
  const [search, setSearch] = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);

  const save = (list) => { setFonts(list); AdminStore.set('fonts', list); toast('Font salvati!'); };
  const removeFont = (f) => save(fonts.filter(x => x !== f));
  const addFont = (f) => { if (!fonts.includes(f)) { save([...fonts, f]); loadGoogleFont(f); } };

  const loadGoogleFont = (name) => {
    const link = document.createElement('link');
    link.href = `https://fonts.googleapis.com/css2?family=${name.replace(/ /g,'+')}:wght@400;600;700&display=swap`;
    link.rel = 'stylesheet';
    document.head.appendChild(link);
  };

  const searchFonts = async () => {
    if (!search.trim()) return;
    setLoading(true); setResults([]);
    try {
      const res = await fetch(`https://www.googleapis.com/webfonts/v1/webfonts?key=AIzaSyDummy&family=${encodeURIComponent(search)}`);
      // Fallback: use a curated list
      const curated = ['Roboto','Open Sans','Lato','Montserrat','Oswald','Raleway','Merriweather','Playfair Display','Nunito','Poppins','Ubuntu','PT Serif','Dancing Script','Pacifico','Lobster','Bebas Neue','Anton','Fjalla One','Righteous','Permanent Marker','Special Elite','Creepster','Bangers','Press Start 2P','VT323','Architects Daughter'];
      const filtered = curated.filter(f => f.toLowerCase().includes(search.toLowerCase()));
      setResults(filtered.slice(0, 12));
      filtered.forEach(loadGoogleFont);
    } catch { setResults([]); }
    setLoading(false);
  };

  return (
    <div>
      <h2 style={{ fontSize:18, fontWeight:700, marginBottom:16 }}>Gestione Font</h2>
      <div style={card}>
        <div style={{ fontWeight:600, fontSize:14, marginBottom:12 }}>Font attivi nel designer</div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginBottom:12 }}>
          {fonts.map(f => (
            <Tag key={f} onRemove={() => removeFont(f)}><span style={{ fontFamily:f }}>{f}</span></Tag>
          ))}
        </div>
      </div>
      <div style={card}>
        <div style={{ fontWeight:600, fontSize:14, marginBottom:12 }}>🔍 Cerca Google Fonts</div>
        <div style={{ display:'flex', gap:8, marginBottom:12 }}>
          <input value={search} onChange={e => setSearch(e.target.value)} onKeyDown={e => e.key==='Enter' && searchFonts()}
            placeholder="Es: Roboto, Pacifico, Bangers..." style={{ ...inp, flex:1 }} />
          <button onClick={searchFonts} style={btn()}>{loading ? '⏳' : '🔍 Cerca'}</button>
        </div>
        {results.length > 0 && (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))', gap:8 }}>
            {results.map(f => (
              <div key={f} style={{ border:'1px solid #e0e0e0', borderRadius:8, padding:10, display:'flex', flexDirection:'column', gap:6 }}>
                <div style={{ fontFamily:f, fontSize:18, color:'#2d3142' }}>Aa</div>
                <div style={{ fontSize:11, color:'#888', fontWeight:600 }}>{f}</div>
                <button onClick={() => addFont(f)}
                  style={{ ...btn(fonts.includes(f)?'#aaa':'#3fc7ba'), padding:'4px 10px', fontSize:11 }}>
                  {fonts.includes(f) ? '✓ Aggiunto' : '+ Aggiungi'}
                </button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

            <input type="password" value={cfg.apiKey} onChange={e => setCfg({...cfg, apiKey:e.target.value})}

          </>
        )}

          <div style={{ background:'#e8f8f5', borderRadius:8, padding:'10px 14px', marginBottom:16, fontSize:12, color:'#27ae60' }}>

          </div>
        )}
        <button onClick={save} style={btn()}>💾 Salva configurazione</button>
      </div>
    </div>
  );
}

// ── LOGIN GATE ────────────────────────────────────────────────
function LoginGate({ onLogin }) {
  const [pwd, setPwd] = useState('');
  const [err, setErr] = useState(false);
  const check = () => { if (pwd === ADMIN_PWD) onLogin(); else setErr(true); };
  return (
    <div style={{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#f0f2f5' }}>
      <div style={{ background:'#fff', borderRadius:16, padding:'36px 32px', width:340, boxShadow:'0 8px 32px rgba(0,0,0,0.12)', textAlign:'center' }}>
        <div style={{ fontSize:48, marginBottom:12 }}>🔒</div>
        <div style={{ fontWeight:800, fontSize:20, color:'#2d3142', marginBottom:4 }}>Admin Panel</div>
        <div style={{ color:'#888', fontSize:13, marginBottom:24 }}>WonderSpit Product Designer</div>
        <input type="password" value={pwd} onChange={e=>{setPwd(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==='Enter'&&check()}
          placeholder="Password admin..." autoFocus
          style={{ ...inp, marginBottom:8, textAlign:'center', border:`1.5px solid ${err?'#e74c3c':'#e0e0e0'}`, background:err?'#fff5f5':'#fafafa' }} />
        {err && <div style={{ color:'#e74c3c', fontSize:12, marginBottom:8 }}>Password errata</div>}
        <button onClick={check} style={{ ...btn(), width:'100%', padding:'11px' }}>Accedi</button>
        <div style={{ marginTop:16, fontSize:11, color:'#bbb' }}>
          <a href="#" style={{ color:'#3fc7ba' }}>← Torna al Designer</a>
        </div>
      </div>
    </div>
  );
}

// Mount gestito dal Router


// ═══════════════════════════════════════════════════════════════
// ROUTER — sceglie quale app mostrare in base all'hash URL
// ═══════════════════════════════════════════════════════════════
function Router() {
  const [view, setView] = React.useState(
    window.location.hash === '#admin' ? 'admin' : 'designer'
  );

  React.useEffect(() => {
    const handler = () => {
      setView(window.location.hash === '#admin' ? 'admin' : 'designer');
    };
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);

  React.useEffect(() => {
    const designerRoot = document.getElementById('root');
    const adminRoot = document.getElementById('admin-root');
    if (view === 'designer') {
      designerRoot.style.display = 'flex';
      adminRoot.style.display = 'none';
      document.title = 'WonderSpit – Product Designer';
      document.body.style.overflow = 'hidden';
      document.body.style.background = '#ebeced';
    } else {
      designerRoot.style.display = 'none';
      adminRoot.style.display = 'block';
      document.title = 'WonderSpit – Admin Panel';
      document.body.style.overflow = 'auto';
      document.body.style.background = '#f0f2f5';
    }
  }, [view]);

  return null;
}

// Mount del router
const routerRoot = document.createElement('div');
document.body.appendChild(routerRoot);
ReactDOM.createRoot(routerRoot).render(<Router />);

// Mount del designer
ReactDOM.createRoot(document.getElementById('root')).render(<DesignerApp />);

// Mount dell'admin
ReactDOM.createRoot(document.getElementById('admin-root')).render(<AdminApp />);

</script>
